name: Publish release assets

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publish-release.yml"
      - "release/RELEASE_NOTES_0.2.0.md"
      - "release/zarg4n Career Overhaul 0.2.0.fifamod"
      - "release/zarg4n Career Overhaul 0.2.0 - Live Editor Runtime.zip"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release files
        uses: actions/checkout@v4

      - name: Update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit v0.2.0 \
            --title "zarg4n Career Overhaul 0.2.0" \
            --notes-file "release/RELEASE_NOTES_0.2.0.md" \
            --latest
          gh release delete-asset v0.2.0 \
            "zarg4n Career Overhaul 0.2.0 - Complete.zip" \
            --yes || true
          gh release upload v0.2.0 \
            "release/zarg4n Career Overhaul 0.2.0.fifamod" \
            "release/zarg4n Career Overhaul 0.2.0 - Live Editor Runtime.zip" \
            --clobber
